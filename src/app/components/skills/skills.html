<section id="skills" class="max-w-4xl mx-auto px-6 py-12 mb-12 scroll-mt-20">
    <div class="bg-white/80 backdrop-blur rounded-2xl p-8 shadow-lg border border-gray-200">
        <h3 class="text-3xl font-bold mb-6 pb-3 border-b-2 border-blue-500 text-gray-800">
            <span class="text-blue-600">▸</span> Technical Skills
        </h3>
        <div class="space-y-6">
            @for (skillGroup of portfolio().skills; track skillGroup.category) {
            <div class="skill-card bg-gray-50 rounded-xl p-5 border border-gray-200 hover:shadow-md transition">
                <h4 class="text-lg font-semibold mb-3 text-gray-800">{{ skillGroup.category }}</h4>
                <div class="flex flex-wrap gap-2">
                    @for (skill of skillGroup.items; track skill) {
                    <span
                        class="skill-tag px-3 py-1 bg-gray-700 rounded-full text-sm hover:bg-gray-800 hover:scale-105 transition cursor-pointer text-white font-medium shadow-sm">
                        {{ skill }}
                    </span>
                    }
                </div>
            </div>
            }
        </div>
    </div>
</section>
