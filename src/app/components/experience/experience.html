<section id="experience" class="max-w-4xl mx-auto px-6 py-12 mb-12 scroll-mt-20">
    <h3 class="text-3xl font-bold mb-6 pb-3 border-b border-gray-300">Work Experience</h3>
    <div class="space-y-8">
        @for (job of portfolio().experience; track job.company + job.period) {
        <div class="experience-card bg-gray-50 rounded-lg p-6 border border-gray-200 hover:border-gray-400 transition">
            <div class="flex flex-col md:flex-row md:justify-between md:items-start mb-4">
                <div>
                    <h4 class="text-2xl font-bold text-gray-900">{{ job.title }}</h4>
                    <p class="text-gray-600 text-lg">{{ job.company }}</p>
                </div>
                <span class="text-gray-600 mt-2 md:mt-0">{{ job.period }}</span>
            </div>
            <ul class="space-y-2 text-gray-700">
                @for (achievement of job.achievements; track achievement) {
                <li class="achievement-item flex items-start gap-3">
                    <span class="text-gray-600 font-bold mt-1">•</span>
                    <span>{{ achievement }}</span>
                </li>
                }
            </ul>
        </div>
        }
    </div>
</section>
